<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lifelog Snippet Dataset</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #4f8ef7;
      --text: #e0e0e0;
      --muted: #777;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    header { padding: 1.75rem 2rem 1.25rem; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.01em; }
    header p { color: var(--muted); margin-top: 0.3rem; font-size: 0.875rem; }

    .controls {
      padding: 0.875rem 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .day-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .day-tab {
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: border-color 0.12s, background 0.12s;
    }
    .day-tab:hover { border-color: #555; }
    .day-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    #status { color: var(--muted); font-size: 0.8rem; margin-left: auto; }

    .gallery {
      padding: 1.5rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, border-color 0.15s;
    }
    .card:hover { transform: translateY(-2px); border-color: #3a3a3a; }

    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      cursor: zoom-in;
      display: block;
      background: #111;
    }
    .card-img.error { opacity: 0.25; cursor: default; }

    .card-body { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; gap: 0.35rem; }
    .card-ts { font-size: 0.72rem; color: var(--muted); font-family: monospace; letter-spacing: 0.02em; }
    .card-cap { font-size: 0.8rem; line-height: 1.55; color: #bbb; }
    .card-cap.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .expand-btn {
      background: none; border: none;
      color: var(--accent); font-size: 0.75rem;
      cursor: pointer; padding: 0;
      text-align: left; margin-top: 0.15rem;
      width: fit-content;
    }
    .expand-btn:hover { text-decoration: underline; }

    .pagination {
      padding: 1.5rem 2rem 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: border-color 0.12s;
      min-width: 2rem;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; cursor: default; }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-ellipsis { color: var(--muted); font-size: 0.8rem; padding: 0 0.2rem; }

    .loading { grid-column: 1 / -1; padding: 4rem; text-align: center; color: var(--muted); font-size: 0.9rem; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.93);
      z-index: 100;
      align-items: center; justify-content: center; flex-direction: column;
      gap: 1rem; padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 78vh; object-fit: contain; border-radius: 6px; }
    .lightbox-meta { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; max-width: 720px; }
    .lightbox-ts { font-size: 0.75rem; color: var(--muted); font-family: monospace; }
    .lightbox-cap { font-size: 0.875rem; color: #ccc; text-align: center; line-height: 1.65; }
    .lightbox-close {
      position: absolute; top: 1rem; right: 1.5rem;
      background: none; border: none;
      color: #888; font-size: 2rem; line-height: 1;
      cursor: pointer;
    }
    .lightbox-close:hover { color: #fff; }

    @media (max-width: 600px) {
      header, .controls, .gallery, .pagination { padding-left: 1rem; padding-right: 1rem; }
      .gallery { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .card-body { padding: 0.5rem; }
    }
    @media (max-width: 360px) {
      .gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Lifelog Snippet Dataset</h1>
  <p>First-person wearable camera footage with descriptive captions</p>
</header>

<div class="controls">
  <div class="day-tabs" id="dayTabs"></div>
  <span id="status"></span>
</div>

<div class="gallery" id="gallery">
  <div class="loading">Loading…</div>
</div>

<div class="pagination" id="pagination"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose" aria-label="Close">&times;</button>
  <img id="lbImg" src="" alt="">
  <div class="lightbox-meta">
    <span class="lightbox-ts" id="lbTs"></span>
    <p class="lightbox-cap" id="lbCap"></p>
  </div>
</div>

<script>
  const DAYS = [
    '20200101','20200102','20200103',
    '20200104','20200105','20200106','20200107',
  ];
  const DAY_LABELS = {
    '20200101':'Jan 1','20200102':'Jan 2','20200103':'Jan 3',
    '20200104':'Jan 4','20200105':'Jan 5','20200106':'Jan 6',
    '20200107':'Jan 7',
  };
  const PAGE_SIZE = 24;

  let currentDay = DAYS[0];
  let currentPage = 1;
  let entries = [];
  const cache = {};

  // ── Day tabs ──────────────────────────────────────────────
  const tabsEl = document.getElementById('dayTabs');
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d === currentDay ? ' active' : '');
    btn.textContent = DAY_LABELS[d];
    btn.id = 'tab-' + d;
    btn.onclick = () => selectDay(d);
    tabsEl.appendChild(btn);
  });

  async function selectDay(day) {
    currentDay = day;
    currentPage = 1;
    document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + day).classList.add('active');

    if (cache[day]) {
      entries = cache[day];
      render();
      return;
    }

    document.getElementById('gallery').innerHTML = '<div class="loading">Loading…</div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('status').textContent = '';

    try {
      const res = await fetch(`data/${day}.json`);
      if (!res.ok) throw new Error(res.status);
      entries = await res.json();
      cache[day] = entries;
    } catch (err) {
      document.getElementById('gallery').innerHTML =
        `<div class="loading">Could not load data for ${DAY_LABELS[day]}.<br>Run <code>python build.py</code> to generate the data/ directory.</div>`;
      return;
    }
    render();
  }

  // ── Render grid ───────────────────────────────────────────
  function render() {
    const total = entries.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = entries.slice(start, start + PAGE_SIZE);

    document.getElementById('status').textContent =
      `${total.toLocaleString()} images · page ${currentPage}/${totalPages}`;

    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    slice.forEach(e => gallery.appendChild(makeCard(e)));

    renderPagination(totalPages);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function makeCard(e) {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = e.img;
    img.alt = e.ts;
    img.loading = 'lazy';
    img.onerror = () => img.classList.add('error');
    img.onclick = () => openLightbox(e);

    const body = document.createElement('div');
    body.className = 'card-body';

    const ts = document.createElement('span');
    ts.className = 'card-ts';
    ts.textContent = e.ts;

    const cap = document.createElement('p');
    cap.className = 'card-cap collapsed';
    cap.textContent = e.cap;

    const btn = document.createElement('button');
    btn.className = 'expand-btn';
    btn.textContent = 'Read more';
    btn.onclick = () => {
      const nowCollapsed = cap.classList.toggle('collapsed');
      btn.textContent = nowCollapsed ? 'Read more' : 'Show less';
    };

    body.append(ts, cap, btn);
    card.append(img, body);
    return card;
  }

  // ── Pagination ────────────────────────────────────────────
  function renderPagination(totalPages) {
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (totalPages <= 1) return;

    function addBtn(label, page, disabled) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (page === currentPage ? ' active' : '');
      btn.textContent = label;
      btn.disabled = !!disabled;
      if (!disabled && page !== currentPage) {
        btn.onclick = () => { currentPage = page; render(); };
      }
      pg.appendChild(btn);
    }

    function addEllipsis() {
      const s = document.createElement('span');
      s.className = 'page-ellipsis';
      s.textContent = '…';
      pg.appendChild(s);
    }

    addBtn('‹', currentPage - 1, currentPage === 1);

    const pages = getPageRange(currentPage, totalPages);
    let prev = null;
    pages.forEach(p => {
      if (prev !== null && p - prev > 1) addEllipsis();
      addBtn(p, p, false);
      prev = p;
    });

    addBtn('›', currentPage + 1, currentPage === totalPages);
  }

  function getPageRange(cur, total) {
    const delta = 2;
    const set = new Set([1, total]);
    for (let i = Math.max(2, cur - delta); i <= Math.min(total - 1, cur + delta); i++) set.add(i);
    return [...set].sort((a, b) => a - b);
  }

  // ── Lightbox ──────────────────────────────────────────────
  const lightbox = document.getElementById('lightbox');

  function openLightbox(e) {
    document.getElementById('lbImg').src = e.img;
    document.getElementById('lbTs').textContent = e.ts;
    document.getElementById('lbCap').textContent = e.cap;
    lightbox.classList.add('open');
  }

  document.getElementById('lbClose').onclick = () => lightbox.classList.remove('open');
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

  // ── Init ──────────────────────────────────────────────────
  selectDay(DAYS[0]);
</script>
</body>
</html>
