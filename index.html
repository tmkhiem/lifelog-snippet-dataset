<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lifelog Snippet Dataset</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #4f8ef7;
      --text: #e0e0e0;
      --muted: #777;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    header { padding: 1.75rem 2rem 1.25rem; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.01em; }
    header p { color: var(--muted); margin-top: 0.3rem; font-size: 0.875rem; }

    .controls {
      padding: 0.875rem 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .day-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .day-tab {
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: border-color 0.12s, background 0.12s;
    }
    .day-tab:hover { border-color: #555; }
    .day-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    #searchInput {
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.8rem;
      width: 220px;
      outline: none;
      transition: border-color 0.12s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    #status { color: var(--muted); font-size: 0.8rem; margin-left: auto; white-space: nowrap; }

    .gallery {
      padding: 1.5rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, border-color 0.15s;
    }
    .card:hover { transform: translateY(-2px); border-color: #3a3a3a; }

    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      cursor: zoom-in;
      display: block;
      background: #111;
    }
    .card-img.error { opacity: 0.25; cursor: default; }

    .card-body { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; gap: 0.35rem; }
    .card-ts { font-size: 0.72rem; color: var(--muted); font-family: monospace; letter-spacing: 0.02em; }
    .card-cap { font-size: 0.8rem; line-height: 1.55; color: #bbb; }
    .card-cap.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .expand-btn {
      background: none; border: none;
      color: var(--accent); font-size: 0.75rem;
      cursor: pointer; padding: 0;
      text-align: left; margin-top: 0.15rem;
      width: fit-content;
    }
    .expand-btn:hover { text-decoration: underline; }

    mark { background: rgba(245,166,35,0.35); color: inherit; border-radius: 2px; padding: 0 1px; }

    .pagination {
      padding: 1.5rem 2rem 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: border-color 0.12s;
      min-width: 2rem;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; cursor: default; }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-ellipsis { color: var(--muted); font-size: 0.8rem; padding: 0 0.2rem; }

    .loading { grid-column: 1 / -1; padding: 4rem; text-align: center; color: var(--muted); font-size: 0.9rem; }

    /* ── Lightbox ─────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      z-index: 100;
      background: #080808;
    }
    .lightbox.open { display: flex; flex-direction: column; }

    .lightbox-close {
      position: absolute; top: 0.875rem; right: 1.25rem;
      background: rgba(0,0,0,0.5); border: none;
      color: #999; font-size: 1.5rem; line-height: 1;
      cursor: pointer; z-index: 2;
      border-radius: 50%; width: 2rem; height: 2rem;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.12s, background 0.12s;
    }
    .lightbox-close:hover { color: #fff; background: rgba(255,255,255,0.12); }

    /* Wide: image left, caption right */
    .lb-inner {
      display: flex;
      flex: 1;
      min-height: 0;         /* let flex children shrink */
    }

    .lb-img-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 1.5rem;
      overflow: hidden;
    }
    .lb-img-pane img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 6px;
      display: block;
    }

    .lb-caption-pane {
      width: 360px;
      min-width: 260px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      padding: 3.5rem 1.5rem 1.5rem;
      overflow-y: auto;          /* caption scrolls, page does not */
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .lb-ts { font-size: 0.75rem; color: var(--muted); font-family: monospace; }
    .lb-cap { font-size: 0.875rem; color: #ccc; line-height: 1.7; }

    /* Narrow: image full-height top, caption scrolls below */
    @media (max-width: 768px) {
      .lb-inner {
        flex-direction: column;
        overflow-y: auto;          /* the inner div scrolls */
        -webkit-overflow-scrolling: touch;
      }
      .lb-img-pane {
        height: 100vh;
        min-height: 100vh;
        flex-shrink: 0;
        padding: 3rem 1rem 1rem;
      }
      .lb-caption-pane {
        width: 100%;
        min-width: 0;
        flex-shrink: 0;
        border-left: none;
        border-top: 1px solid var(--border);
        overflow-y: visible;       /* parent lb-inner handles scroll */
        padding: 1.25rem 1rem 3rem;
      }
    }

    @media (max-width: 600px) {
      header, .controls, .gallery, .pagination { padding-left: 1rem; padding-right: 1rem; }
      .gallery { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .card-body { padding: 0.5rem; }
      #searchInput { width: 100%; }
    }
    @media (max-width: 360px) {
      .gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Lifelog Snippet Dataset</h1>
  <p>First-person wearable camera footage with descriptive captions</p>
</header>

<div class="controls">
  <div class="day-tabs" id="dayTabs"></div>
  <input type="search" id="searchInput" placeholder="Search captions…" autocomplete="off" spellcheck="false">
  <span id="status"></span>
</div>

<div class="gallery" id="gallery">
  <div class="loading">Loading…</div>
</div>

<div class="pagination" id="pagination"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose" aria-label="Close">&times;</button>
  <div class="lb-inner" id="lbInner">
    <div class="lb-img-pane">
      <img id="lbImg" src="" alt="">
    </div>
    <div class="lb-caption-pane">
      <span class="lb-ts" id="lbTs"></span>
      <p class="lb-cap" id="lbCap"></p>
    </div>
  </div>
</div>

<script>
  const DAYS = [
    '20200101','20200102','20200103',
    '20200104','20200105','20200106','20200107',
  ];
  const DAY_LABELS = {
    '20200101':'Jan 1','20200102':'Jan 2','20200103':'Jan 3',
    '20200104':'Jan 4','20200105':'Jan 5','20200106':'Jan 6',
    '20200107':'Jan 7',
  };
  const PAGE_SIZE = 24;

  let currentDay = DAYS[0];
  let currentPage = 1;
  let entries = [];      // raw loaded entries for current day
  let filtered = [];     // entries after search filter
  let searchTerms = [];
  const cache = {};

  // ── Day tabs ──────────────────────────────────────────────
  const tabsEl = document.getElementById('dayTabs');
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d === currentDay ? ' active' : '');
    btn.textContent = DAY_LABELS[d];
    btn.id = 'tab-' + d;
    btn.onclick = () => selectDay(d);
    tabsEl.appendChild(btn);
  });

  // ── Search ────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', function () {
    const raw = this.value.trim().toLowerCase();
    searchTerms = raw ? raw.split(/\s+/) : [];
    currentPage = 1;
    applyFilter();
    render();
  });

  function applyFilter() {
    if (!searchTerms.length) { filtered = entries; return; }
    filtered = entries.filter(e => {
      const cap = e.cap.toLowerCase();
      return searchTerms.every(t => cap.includes(t));
    });
  }

  // Returns highlighted HTML string, or null if no active search.
  function highlight(text) {
    if (!searchTerms.length) return null;
    const escaped = searchTerms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    return text.replace(new RegExp(`(${escaped.join('|')})`, 'gi'), '<mark>$1</mark>');
  }

  function setCapText(el, text) {
    const hl = highlight(text);
    if (hl !== null) el.innerHTML = hl; else el.textContent = text;
  }

  // ── Load day ──────────────────────────────────────────────
  async function selectDay(day) {
    currentDay = day;
    currentPage = 1;
    document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + day).classList.add('active');

    if (cache[day]) {
      entries = cache[day];
      applyFilter();
      render();
      return;
    }

    document.getElementById('gallery').innerHTML = '<div class="loading">Loading…</div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('status').textContent = '';

    try {
      const res = await fetch(`data/${day}.json`);
      if (!res.ok) throw new Error(res.status);
      entries = await res.json();
      cache[day] = entries;
    } catch {
      document.getElementById('gallery').innerHTML =
        `<div class="loading">Could not load data for ${DAY_LABELS[day]}.<br>Run <code>python build.py</code> to generate the data/ directory.</div>`;
      return;
    }
    applyFilter();
    render();
  }

  // ── Render grid ───────────────────────────────────────────
  function render() {
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);

    const isFiltered = searchTerms.length > 0;
    document.getElementById('status').textContent = isFiltered
      ? `${total.toLocaleString()} of ${entries.length.toLocaleString()} · page ${currentPage}/${totalPages}`
      : `${entries.length.toLocaleString()} images · page ${currentPage}/${totalPages}`;

    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    if (slice.length === 0) {
      gallery.innerHTML = '<div class="loading">No results.</div>';
    } else {
      slice.forEach(e => gallery.appendChild(makeCard(e)));
    }

    renderPagination(totalPages);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function makeCard(e) {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = e.img;
    img.alt = e.ts;
    img.loading = 'lazy';
    img.onerror = () => img.classList.add('error');
    img.onclick = () => openLightbox(e);

    const body = document.createElement('div');
    body.className = 'card-body';

    const ts = document.createElement('span');
    ts.className = 'card-ts';
    ts.textContent = e.ts;

    const cap = document.createElement('p');
    cap.className = 'card-cap collapsed';
    setCapText(cap, e.cap);

    const btn = document.createElement('button');
    btn.className = 'expand-btn';
    btn.textContent = 'Read more';
    btn.onclick = () => {
      const nowCollapsed = cap.classList.toggle('collapsed');
      btn.textContent = nowCollapsed ? 'Read more' : 'Show less';
    };

    body.append(ts, cap, btn);
    card.append(img, body);
    return card;
  }

  // ── Pagination ────────────────────────────────────────────
  function renderPagination(totalPages) {
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (totalPages <= 1) return;

    const addBtn = (label, page, disabled) => {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (page === currentPage ? ' active' : '');
      btn.textContent = label;
      btn.disabled = !!disabled;
      if (!disabled && page !== currentPage) btn.onclick = () => { currentPage = page; render(); };
      pg.appendChild(btn);
    };
    const addEllipsis = () => {
      const s = document.createElement('span');
      s.className = 'page-ellipsis';
      s.textContent = '…';
      pg.appendChild(s);
    };

    addBtn('‹', currentPage - 1, currentPage === 1);
    let prev = null;
    getPageRange(currentPage, totalPages).forEach(p => {
      if (prev !== null && p - prev > 1) addEllipsis();
      addBtn(p, p, false);
      prev = p;
    });
    addBtn('›', currentPage + 1, currentPage === totalPages);
  }

  function getPageRange(cur, total) {
    const set = new Set([1, total]);
    for (let i = Math.max(2, cur - 2); i <= Math.min(total - 1, cur + 2); i++) set.add(i);
    return [...set].sort((a, b) => a - b);
  }

  // ── Lightbox ──────────────────────────────────────────────
  const lightbox = document.getElementById('lightbox');

  function openLightbox(e) {
    document.getElementById('lbImg').src = e.img;
    document.getElementById('lbTs').textContent = e.ts;
    setCapText(document.getElementById('lbCap'), e.cap);
    // reset scroll positions
    document.getElementById('lbInner').scrollTop = 0;
    document.querySelector('.lb-caption-pane').scrollTop = 0;
    // lock page scroll
    document.body.style.overflow = 'hidden';
    lightbox.classList.add('open');
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lbClose').onclick = closeLightbox;
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── Init ──────────────────────────────────────────────────
  selectDay(DAYS[0]);
</script>
</body>
</html>
